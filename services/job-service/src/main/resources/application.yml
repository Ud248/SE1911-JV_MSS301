server:
  port: 8081
spring:
  application:
    name: job-service
  datasource:
    url: jdbc:postgresql://job-db:5432/talenthub_job_dbs
    username: dieunt
    password:
  jpa:
    hibernate:
      ddl-auto: update    # dev only, prod đổi qua Flyway
    properties.hibernate.format_sql: true
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: ${SPRING_RABBITMQ_USERNAME:talenthub}
    password: ${SPRING_RABBITMQ_PASSWORD:talenthub}
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 15
    instance-id: ${spring.application.name}:${server.port}
management:
  endpoints:
    web:
      exposure:
        include: health, info