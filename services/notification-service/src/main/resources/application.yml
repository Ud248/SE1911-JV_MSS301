server:
  port: 8084

spring:
  application:
    name: notification-service

  # Kết nối PostgreSQL (notification-db)
  datasource:
    url: jdbc:postgresql://notification-db:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER:dieunt}
    password:
  jpa:
    hibernate:
      ddl-auto: update    # dev only
    properties:
      hibernate:
        format_sql: true

  # Kết nối RabbitMQ
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_DEFAULT_USER:talenthub}
    password: ${RABBITMQ_DEFAULT_PASS:talenthub}
    listener:
      simple:
        # Khi message xử lý fail, không tự động re-queue lại đầu queue.
        # Thay vào đó, message sẽ được route vào DLQ
        default-requeue-rejected: false
        # Consumer xử lý 1 message tại 1 thời điểm
        prefetch: 1
        retry:
          # Bật retry với exponential backoff (BRULE-15)
          enabled: true
          initial-interval: 1000    # retry lần 1 sau 1 giây
          multiplier: 2.0           # lần 2 sau 2s, lần 3 sau 4s
          max-attempts: 3           # tối đa 3 lần thử
          max-interval: 10000       # không chờ quá 10 giây

  # Cấu hình SMTP gửi email tới MailHog
  mail:
    host: ${MAILHOG_HOST:localhost}           # Docker profile sẽ override thành "mailhog"
    port: 1025                                # MailHog SMTP port
    properties:
      mail:
        smtp:
          auth: false          # MailHog không yêu cầu xác thực
          starttls:
            enable: false      # MailHog không dùng TLS

# Eureka client
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health, info